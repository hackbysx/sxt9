<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FREE TOOL • CRACK EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;900&family=Orbitron:wght@600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --neon: #00ff88; --cyber: #00f3ff; --bg: #020205;
        }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background-color: var(--bg); color: #fff; height: 100vh; overflow: hidden; font-family: 'Rajdhani', sans-serif; }
        iframe { width: 100%; height: 100%; border: none; position: absolute; z-index: 1; }

        /* Hacker Dashboard UI */
        .ui-panel {
            position: fixed; top: 100px; left: 20px; width: 260px; z-index: 9000;
            background: rgba(2, 5, 10, 0.95); border-radius: 12px; border: 1px solid var(--cyber);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.4); backdrop-filter: blur(10px);
            padding: 0; overflow: hidden;
        }

        .panel-header {
            background: linear-gradient(90deg, rgba(0, 243, 255, 0.2), transparent);
            padding: 10px 15px; border-bottom: 1px solid var(--cyber);
            display: flex; justify-content: space-between; align-items: center; cursor: move;
        }

        /* Cyberpunk Animations */
        .scan-line {
            position: absolute; width: 100%; height: 2px; background: var(--cyber);
            top: 0; left: 0; opacity: 0.5; box-shadow: 0 0 15px var(--cyber);
            animation: scanning 3s linear infinite; z-index: 5;
        }
        @keyframes scanning { 0% { top: 0%; } 100% { top: 100%; } }

        .glitch-text {
            font-family: 'Orbitron'; font-size: 35px; font-weight: 900;
            text-shadow: 2px 0 red, -2px 0 blue; animation: glitch 1s infinite;
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .timer-box { font-family: 'Orbitron'; font-size: 24px; color: #fff; text-shadow: 0 0 10px #fff; }
        
        /* Floating Shake Button */
        .tg-btn {
            position: fixed; bottom: 30px; right: 20px; z-index: 10001;
            background: #229ED9; color: white; padding: 12px 20px;
            border-radius: 50px; font-weight: bold; font-family: 'Orbitron';
            box-shadow: 0 0 20px #229ED9; text-decoration: none;
            display: flex; align-items: center; gap: 10px;
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(5deg) scale(1.05); }
            50% { transform: rotate(0deg); }
            75% { transform: rotate(-5deg) scale(1.05); }
            100% { transform: rotate(0deg); }
        }
        
        /* Celebration Overlay */
        #resOverlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); z-index: 10000; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #resOverlay.show { transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body onload="startEngine()">

    <iframe src="https://13lgame8.com/register?inviteCode=2YCR9ZN&from=web"></iframe>

    <a href="https://t.me/FREE_TOOL_76" class="tg-btn">
        <i class="fa-brands fa-telegram text-2xl"></i>
        <span>JOIN TELEGRAM</span>
    </a>

    <div class="ui-panel" id="mainPanel">
        <div class="scan-line"></div>
        <div class="panel-header" id="dragHeader">
            <span class="text-[10px] font-bold text-cyan-400 font-['Orbitron']">👑 𝐂𝐑𝐀𝐂𝐊 𝐁𝐘 FREE TOOL 💲 💀</span>
            <i class="fa-solid fa-microchip text-cyan-400"></i>
        </div>
        
        <div class="p-4 text-center">
            <div class="text-[10px] text-gray-500 mb-1">TARGET PERIOD: <span id="period" class="text-white">----</span></div>
            <div class="timer-box mb-3" id="timer">00:00</div>
            
            <div class="bg-black/60 border border-cyan-900 rounded-lg p-4 relative overflow-hidden">
                <div class="text-[9px] text-cyan-500 mb-1 tracking-widest uppercase">Prediction Signal</div>
                <div id="p-res" class="glitch-text text-white">WAIT</div>
                <div id="p-num" class="text-[10px] text-yellow-400 mt-2 font-bold">SCANNING DATA...</div>
            </div>

            <div class="mt-4 flex justify-between text-[9px] text-gray-500 font-bold">
                <span>BOT: CONNECTED</span>
                <span>SEC: BYPASS</span>
            </div>
        </div>
    </div>

    <div id="resOverlay"><div id="resMsg"></div></div>

<script>
    // Removed Bot Token for security, update if you need Telegram alerts
    const API = "https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json";
    
    let lastPeriod = "", currentPrediction = null;

    function startEngine() {
        setInterval(() => {
            const d = new Date();
            const s = d.getSeconds();
            let rem = 30 - (s % 30);
            document.getElementById('timer').innerText = `00:${rem < 10 ? '0'+rem : rem}`;
            if(rem === 30 || rem === 1) syncData();
        }, 1000);
        syncData();
    }

    async function syncData() {
        try {
            const res = await fetch(`${API}?ts=${Date.now()}`);
            const data = await res.json();
            const latest = data.data.list[0];

            if(currentPrediction && latest.issueNumber === currentPrediction.period) {
                const actual = parseInt(latest.number) >= 5 ? "BIG" : "SMALL";
                const isWin = currentPrediction.type === actual;
                showResultAnim(isWin);
                currentPrediction = null;
            }

            if(latest.issueNumber !== lastPeriod) {
                lastPeriod = latest.issueNumber;
                const nextP = (BigInt(latest.issueNumber) + 1n).toString();
                document.getElementById('period').innerText = nextP;
                
                const type = (parseInt(latest.number) + 7) % 2 === 0 ? "BIG" : "SMALL";
                document.getElementById('p-res').innerText = type;
                document.getElementById('p-res').style.color = type === 'BIG' ? '#00ff88' : '#ff003c';
                document.getElementById('p-num').innerText = "TARGET LOCKED: " + ((parseInt(latest.number) * 2) % 10);
                
                currentPrediction = { period: nextP, type: type };
            }
        } catch(e) {}
    }

    function showResultAnim(win) {
        const overlay = document.getElementById('resOverlay');
        const msg = document.getElementById('resMsg');
        if(win) {
            msg.innerHTML = `<div class="text-neon font-black text-4xl font-['Orbitron']">SUCCESS</div>`;
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        } else {
            msg.innerHTML = `<div class="text-red-500 font-black text-4xl font-['Orbitron']">LOSS</div>`;
        }
        overlay.classList.add('show');
        setTimeout(() => overlay.classList.remove('show'), 3000);
    }

    // Drag Logic
    const panel = document.getElementById("mainPanel");
    const header = document.getElementById("dragHeader");
    let offset = [0,0], isDown = false;
    header.onpointerdown = (e) => { isDown = true; offset = [panel.offsetLeft - e.clientX, panel.offsetTop - e.clientY]; };
    document.onpointermove = (e) => { if (isDown) { panel.style.left = (e.clientX + offset[0]) + 'px'; panel.style.top = (e.clientY + offset[1]) + 'px'; } };
    document.onpointerup = () => isDown = false;
</script>
</body>
</html>
