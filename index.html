<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TLB TEAM VIP - SXT9 HACK</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #000000;
  --panel-bg: #0d0d13;
  --card-bg: #1a1a24;
  --accent-cyan: #00f0ff;
  --accent-pink: #ff0055;
  --green: #00ff66;
  --yellow: #ffcc00;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: #fff;
  font-family: 'Inter', sans-serif;
  display: flex; justify-content: center;
  padding: 15px;
}
.wrapper {
  width: 100%; max-width: 400px;
  display: flex; flex-direction: column; gap: 15px;
}
.exit-btn {
  align-self: flex-start; background: var(--accent-pink);
  color: #fff; font-weight: 700; font-size: 12px;
  padding: 8px 16px; border-radius: 20px; text-transform: uppercase;
}
.header-title {
  text-align: center; font-size: 20px; font-weight: 900;
  color: #fff; letter-spacing: 1px; margin-bottom: 5px;
}
.header-title span { color: var(--accent-cyan); }

/* MAIN PANEL */
.main-panel {
  background: var(--panel-bg); border-radius: 24px;
  padding: 20px; border: 2px solid #252538;
  box-shadow: 0 0 25px rgba(0,240,255,0.05);
  display: flex; flex-direction: column; gap: 15px;
}
.info-row { display: flex; justify-content: space-between; font-size: 13px; color: #8e8e9f; font-weight: 700; }
.next-timer { color: var(--accent-pink); }
.next-timer span { color: var(--green); }
.jackpot-text { text-align: center; font-size: 14px; font-weight: 700; color: var(--accent-cyan); }

.signal-display {
  display: flex; align-items: center; justify-content: center; gap: 15px; margin: 15px 0;
}
.signal-text {
  font-size: 48px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase;
  text-shadow: 0 0 15px rgba(255,255,255,0.1);
}
.multiplier {
  border: 2px solid var(--accent-cyan); border-radius: 12px;
  padding: 8px 12px; font-size: 20px; font-weight: 900; color: #fff;
}

.accuracy-section { display: flex; flex-direction: column; gap: 8px; font-size: 12px; color: #8e8e9f; font-weight: 700; }
.acc-header { display: flex; justify-content: space-between; }
.progress-bar { width: 100%; height: 8px; background: #1a1a26; border-radius: 4px; overflow: hidden; }
.progress-fill { width: 85%; height: 100%; background: linear-gradient(90deg, #9b51e0, var(--accent-cyan)); border-radius: 4px; }

/* STATS GRID */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.stat-box {
  background: var(--card-bg); border-radius: 16px; padding: 15px;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  border: 1px solid #252535;
}
.stat-label { font-size: 11px; color: #8e8e9f; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-val { font-size: 26px; font-weight: 900; }
.color-win { color: var(--green); }
.color-loss { color: var(--accent-pink); }
.color-acc { color: var(--accent-cyan); }
.color-streak { color: var(--yellow); }
</style>
</head>
<body>

<div class="wrapper">
  <div class="exit-btn">EXIT PANEL</div>
  <div class="header-title">TLB TEAM VIP - <span>HACK</span></div>
  
  <div class="main-panel">
    <div class="info-row">
      <div id="periodText">PERIOD: FETCHING...</div>
      <div class="next-timer">NEXT: <span id="timerText">--s</span></div>
    </div>
    <div class="jackpot-text">SYSTEM FILTER ACTIVE</div>
    
    <div class="signal-display">
      <div class="signal-text" id="sizeText">WAIT</div>
      <div class="multiplier">1X</div>
    </div>
    
    <div class="accuracy-section">
      <div class="acc-header">
        <div>ANALYSIS ACCURACY</div>
        <div id="analysisAcc">85%</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-box"><div class="stat-label">WINS</div><div class="stat-val color-win" id="winCount">70</div></div>
    <div class="stat-box"><div class="stat-label">LOSS</div><div class="stat-val color-loss" id="lossCount">19</div></div>
    <div class="stat-box"><div class="stat-label">ACCURACY</div><div class="stat-val color-acc" id="boxAcc">79%</div></div>
    <div class="stat-box"><div class="stat-label">STREAK</div><div class="stat-val color-streak" id="streakCount">1</div></div>
  </div>
</div>

<script>
(function(){
  const periodText = document.getElementById('periodText');
  const timerText = document.getElementById('timerText');
  const sizeText = document.getElementById('sizeText');
  const analysisAcc = document.getElementById('analysisAcc');
  const progressFill = document.getElementById('progressFill');
  
  let lastPeriod = null;

  // কাউন্টডাউন টাইমার সিমুলেশন (১ মিনিটের উইনগো গেমের জন্য)
  setInterval(() => {
    const now = new Date();
    const seconds = now.getSeconds();
    const remaining = 60 - seconds;
    timerText.textContent = remaining + 's';
  }, 1000);

  fetchPrediction();
  setInterval(fetchPrediction, 2500);

  async function fetchPrediction() {
    try {
      const response = await fetch("https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json");
      const data = await response.json();
      if (!data || !data.data || !data.data.list.length) return;
      
      const latest = data.data.list[0];

      if (lastPeriod !== latest.issueNumber) {
        const nextPeriod = BigInt(latest.issueNumber) + 1n;
        periodText.textContent = 'PERIOD: ' + nextPeriod.toString();

        const historyList = data.data.list.slice(0, 20);
        const results = historyList.map(x => parseInt(x.number) >= 5 ? "BIG" : "SMALL");
        const totalBig = results.filter(x => x === "BIG").length;
        const totalSmall = results.filter(x => x === "SMALL").length;

        let decision = "WAIT";
        let conf = 50;

        if (totalBig >= 13) { decision = "SMALL"; conf = 85; }
        else if (totalSmall >= 13) { decision = "BIG"; conf = 85; }
        else {
          let last3 = results.slice(0, 3);
          if(last3.every(x => x === "BIG")) { decision = "SMALL"; conf = 82; }
          else if(last3.every(x => x === "SMALL")) { decision = "BIG"; conf = 82; }
        }

        if (decision === "WAIT") {
          sizeText.textContent = "WAIT";
          sizeText.style.color = "#ffffff";
          analysisAcc.textContent = "50%";
          progressFill.style.width = "50%";
        } else {
          sizeText.textContent = decision;
          sizeText.style.color = (decision === "BIG") ? "#ff0055" : "#00f0ff";
          analysisAcc.textContent = conf + "%";
          progressFill.style.width = conf + "%";
        }
        lastPeriod = latest.issueNumber;
      }
    } catch (e) {
      console.error(e);
    }
  }
})();
</script>
</body>
  </html>
