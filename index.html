<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BD_AKASH_NUMBER_HACK - CLEAN</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #000;
  --card-grad: linear-gradient(90deg,#b3e5ff,#c7a6ff,#ffb6e6);
  --pill-bg: linear-gradient(180deg,#071026,#021020);
}
* { box-sizing: border-box; }
body {
  margin: 0; background: var(--bg); color: #fff;
  font-family: 'Inter', sans-serif; overflow: hidden;
  display: flex; justify-content: center; align-items: center; height: 100vh;
}
.container { 
  width: 100%; 
  max-width: 420px; 
  padding: 0 12px;
}
.photo-card {
  width: 100%; 
  background: var(--card-grad); 
  border-radius: 12px;
  padding: 20px; 
  box-shadow: 0 10px 25px rgba(0,0,0,0.6);
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  gap: 12px;
  text-align: center;
  position: relative;
}
.panel-content {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.title { 
  font-size: 18px; 
  font-weight: 900; 
  color: #001b2e; 
  margin-bottom: 5px;
}
.series-text { 
  font-weight: 900; 
  font-size: 16px; 
  color: #022b36; 
}
.size-text { 
  font-weight: 900; 
  font-size: 24px; 
  color: #ff8b6b; 
  text-transform: uppercase;
}
.pills { 
  display: flex; 
  justify-content: center; 
  gap: 15px; 
  margin-top: 10px; 
}
.pill {
  width: 70px; 
  height: 50px; 
  border-radius: 10px;
  background: var(--pill-bg); 
  color: #dfffe7;
  font-weight: 900; 
  font-size: 24px;
  display: flex; 
  align-items: center; 
  justify-content: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.4);
  position: relative;
}
.loader-inner {
  position: absolute;
  width: 30px; 
  height: 30px;
  border: 4px solid rgba(255,255,255,0.2);
  border-top-color: #00d4ff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  display: none;
}
@keyframes spin { 
  to { transform: rotate(360deg); } 
}
.status-badge {
  margin-top: 15px;
  font-size: 13px;
  color: #006400;
  font-weight: bold;
}
</style>
</head>
<body>

<div class="container">
  <div class="photo-card">
    <div class="panel-content">
      <div class="title">🐯 BD_AKASH_PREDICTOR 🐯</div>
      <div class="series-text" id="seriesText">PERIOD | ---</div>
      <div class="size-text" id="sizeText">WAITING...</div>
      
      <div class="pills">
        <div class="pill"><div id="pill1">-</div><div class="loader-inner" id="load1"></div></div>
        <div class="pill"><div id="pill2">-</div><div class="loader-inner" id="load2"></div></div>
        <div class="pill"><div id="pill3">-</div><div class="loader-inner" id="load3"></div></div>
      </div>
      
      <div class="status-badge">✅ System Active & Clean</div>
    </div>
  </div>
</div>

<script>
(function(){
  const p1 = document.getElementById('pill1');
  const p2 = document.getElementById('pill2');
  const p3 = document.getElementById('pill3');
  const l1 = document.getElementById('load1');
  const l2 = document.getElementById('load2');
  const l3 = document.getElementById('load3');
  const seriesText = document.getElementById('seriesText');
  const sizeText = document.getElementById('sizeText');
  
  let lastPeriod = null;
  const B_POOL = [5, 6, 7, 8, 9];
  const S_POOL = [0, 1, 2, 3, 4];

  async function fetchPrediction() {
    try {
      const response = await fetch("https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json");
      const data = await response.json();
      const latest = data.data.list[0];

      // Logic: Simple Big/Small trend
      const last5 = data.data.list.slice(0, 5).map(x => x.number >= 5 ? "BIG" : "SMALL");
      const bigCount = last5.filter(x => x === "BIG").length;
      const nextPrediction = bigCount > 2 ? "BIG" : "SMALL";

      if (lastPeriod !== latest.issueNumber) {
        const nextPeriod = BigInt(latest.issueNumber) + 1n;
        seriesText.textContent = 'PERIOD | ' + nextPeriod.toString().slice(-3);

        let currentNums = [];
        const pool = (nextPrediction === "BIG") ? B_POOL : S_POOL;
        currentNums = Array.from({length: 3}, () => pool[Math.floor(Math.random() * pool.length)]);

        sizeText.textContent = nextPrediction;
        sizeText.style.color = (nextPrediction === "BIG") ? '#ff4b2b' : '#007bff';
        
        showLoaders();
        setTimeout(() => {
          hideLoaders();
          p1.textContent = currentNums[0];
          p2.textContent = currentNums[1];
          p3.textContent = currentNums[2];
        }, 2000);

        lastPeriod = latest.issueNumber;
      }
    } catch (e) {
      seriesText.textContent = 'CONNECTION ERROR';
    }
  }

  function showLoaders(){
    [l1,l2,l3].forEach(l => l.style.display='block');
    [p1,p2,p3].forEach(p => p.style.visibility='hidden');
  }
  
  function hideLoaders(){
    [l1,l2,l3].forEach(l => l.style.display='none');
    [p1,p2,p3].forEach(p => p.style.visibility='visible');
  }

  fetchPrediction();
  setInterval(fetchPrediction, 3000);
})();
</script>
</body>
</html>
